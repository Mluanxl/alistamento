<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Alistamento Militar</title>

    <link rel="stylesheet" href="..\style\pag04.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<header>

    <div class="logo">
        <i class="fa-solid fa-bars"></i>
        <h2>Alistamento Militar</h2>
    </div>

    <nav>
        <a href="pag01.html">Início</a>
        <a href="pag02.html">Consultar</a>
        <a href="pag04.html">Cadastrar</a>
        <a href="pag03.html">Perfil</a>
    </nav>

</header>

<section class="container">

    <div class="card">

        <div class="icone">
            <i class="fa-solid fa-user"></i>
        </div>

        <h1>CADASTRAR</h1>

        <p>
            Inicie seu processo de alistamento obrigatório
            preenchendo os dados abaixo.
        </p>

        <form>

            <div class="campo">
                <label>Nome Completo</label>
                <input type="text" placeholder="Seu nome completo">
            </div>

            <div class="duas-colunas">

                <div class="campo">
                    <label>CPF</label>
                    <input type="text" placeholder="000.000.000-00">
                </div>

                <div class="campo">
                    <label>Data de Nascimento</label>
                    <input type="date">
                </div>

            </div>

            <div class="campo">
                <label>E-mail</label>
                <input type="email" placeholder="seu@email.com">
            </div>

            <div class="campo">
                <label>Senha</label>

                <div class="senha">
                    <input type="password" placeholder="Mínimo 8 caracteres">
                    <i class="fa-regular fa-eye"></i>
                </div>

            </div>

            <button type="submit">
                CONCLUIR ALISTAMENTO
                <i class="fa-solid fa-arrow-right"></i>
            </button>

        </form>

        <small>
            Ao concluir, você concorda com nossos Termos de Uso e Política de Privacidade.
        </small>

    </div>

</section>

<footer>

<p>© 2024 Ministério da Defesa</p>

</footer>

</body>
</html>
